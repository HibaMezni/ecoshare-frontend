<nav class="glass sticky top-0 z-50 border-b border-primary/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <a routerLink="/" class="flex items-center gap-2 text-2xl font-bold bg-gradient-to-r from-primary-500 to-secondary-500 bg-clip-text text-transparent hover:opacity-80 transition-smooth">
          <span class="text-xl">🌱</span>
          EcoShare
        </a>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-8">
        <a routerLink="/annonces" class="text-text-secondary hover:text-primary-500 transition-smooth font-medium">
          Annonces
        </a>
        <a routerLink="/demandes" class="text-text-secondary hover:text-primary-500 transition-smooth font-medium">
          Demandes
        </a>
        <a routerLink="/about" class="text-text-secondary hover:text-primary-500 transition-smooth font-medium">
          À propos
        </a>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-lg glass hover:bg-primary/10 transition-smooth"
          title="Toggle theme">
          <span class="text-xl">{{ currentTheme === 'dark' ? '☀️' : '🌙' }}</span>
        </button>

        <!-- Auth Buttons -->
        <div class="hidden md:flex items-center gap-3">
          <ng-container *ngIf="!isAuthenticated">
            <a routerLink="/auth/login" class="px-4 py-2 text-text-primary hover:text-primary-500 transition-smooth font-medium">
              Connexion
            </a>
            <a routerLink="/auth/register" class="px-4 py-2 rounded-lg bg-gradient-to-r from-primary-500 to-primary-600 text-white hover:shadow-lg hover:shadow-primary-500/50 transition-smooth font-medium">
              S&apos;inscrire
            </a>
          </ng-container>

          <ng-container *ngIf="isAuthenticated && currentUser">
            <div class="flex items-center gap-3 pl-3 border-l border-primary/20">
              <span class="text-sm text-text-secondary">{{ currentUser.prenom }}</span>
              <button
                (click)="logout()"
                class="px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-smooth font-medium">
                Déconnexion
              </button>
            </div>
          </ng-container>
        </div>

        <!-- Mobile Menu Button -->
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden p-2 rounded-lg glass hover:bg-primary/10 transition-smooth">
          <span class="text-xl">{{ mobileMenuOpen ? '✕' : '☰' }}</span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen" class="md:hidden pb-4 space-y-3 border-t border-primary/20 pt-4">
      <a routerLink="/annonces" (click)="closeMobileMenu()" class="block px-4 py-2 text-text-secondary hover:text-primary-500 transition-smooth font-medium">
        Annonces
      </a>
      <a routerLink="/demandes" (click)="closeMobileMenu()" class="block px-4 py-2 text-text-secondary hover:text-primary-500 transition-smooth font-medium">
        Demandes
      </a>
      <a routerLink="/about" (click)="closeMobileMenu()" class="block px-4 py-2 text-text-secondary hover:text-primary-500 transition-smooth font-medium">
        À propos
      </a>

      <div class="pt-3 border-t border-primary/20 space-y-2">
        <ng-container *ngIf="!isAuthenticated">
          <a routerLink="/auth/login" (click)="closeMobileMenu()" class="block px-4 py-2 text-text-primary hover:text-primary-500 transition-smooth font-medium">
            Connexion
          </a>
          <a routerLink="/auth/register" (click)="closeMobileMenu()" class="block px-4 py-2 rounded-lg bg-gradient-to-r from-primary-500 to-primary-600 text-white text-center font-medium">
            S&apos;inscrire
          </a>
        </ng-container>

        <ng-container *ngIf="isAuthenticated && currentUser">
          <div class="px-4 py-2 text-sm text-text-secondary">
            Connecté: {{ currentUser.prenom }}
          </div>
          <button
            (click)="logout()"
            class="w-full px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-smooth font-medium">
            Déconnexion
          </button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
