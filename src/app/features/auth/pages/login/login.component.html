<div class="min-h-screen flex items-center justify-center px-4 py-12 bg-gradient-to-br from-dark-950 via-dark-900 to-dark-800">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="glass p-8 rounded-2xl">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="text-5xl mb-4">🌱</div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-primary-500 to-secondary-500 bg-clip-text text-transparent">
          EcoShare
        </h1>
        <p class="text-text-secondary mt-2">Connectez-vous à votre compte</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-6 p-4 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        {{ errorMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-text-primary mb-2">
            Email
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="votre.email@example.com"
            class="w-full px-4 py-3 rounded-lg glass focus:outline-none focus:ring-2 focus:ring-primary-500 transition-smooth text-text-primary placeholder:text-text-secondary/50"
          />
          <ng-container *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            <p class="mt-1 text-sm text-red-400">Email invalide</p>
          </ng-container>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-text-primary mb-2">
            Mot de passe
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg glass focus:outline-none focus:ring-2 focus:ring-primary-500 transition-smooth text-text-primary placeholder:text-text-secondary/50"
          />
          <ng-container *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            <p class="mt-1 text-sm text-red-400">Le mot de passe doit contenir au moins 6 caractères</p>
          </ng-container>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="form.invalid || isLoading"
          class="w-full px-4 py-3 rounded-lg bg-gradient-to-r from-primary-500 to-primary-600 text-white font-semibold hover:shadow-lg hover:shadow-primary-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-smooth">
          {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-primary/20"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-dark-900 text-text-secondary">Ou</span>
        </div>
      </div>

      <!-- Register Link -->
      <p class="text-center text-text-secondary">
        Pas encore inscrit?
        <a routerLink="/auth/register" class="text-primary-500 hover:text-primary-400 font-semibold transition-smooth">
          S&apos;inscrire
        </a>
      </p>
    </div>

    <!-- Footer -->
    <p class="text-center text-text-secondary text-sm mt-6">
      En vous connectant, vous acceptez nos conditions d&apos;utilisation
    </p>
  </div>
</div>
